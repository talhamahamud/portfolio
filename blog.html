<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      href="static/images/android-chrome-512x512.png"
    />
    <title>Blog - Talha Mahamud</title>
    <link rel="stylesheet" href="static/css/blog_style.css" />
  </head>

  <body>
    <header>
      <a class="title" href="index.html">
        <h1>█▓▒▒░░░TM░░░▒▒▓█</h1>
      </a>
      <p>TO THE INFINITY AND BEYOND</p>
      <nav>
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="blog.html">Blog</a>
        <!-- <a href="/about/">About</a> -->
      </nav>
    </header>

    <main>
      <h2>Blog Posts</h2>
      <p>
        You can search by, Physics, Math, ML, Phillosophy to get related posts.
      </p>

      <div class="search-container">
        <input
          type="text"
          class="search-box"
          id="searchBox"
          placeholder="Search blog posts..."
        />
      </div>
      <p class="no-results" id="noResults">
        No posts found matching your search.
      </p>

      <ul class="blog-posts" id="blogList">
        <li>
          <span>2025-12-24</span>
          <a href="post/25.html">This Is Why I Started Writing! </a>
        </li>
      </ul>
    </main>

    <footer>
      <p>𝚿 Talha Mahamud 𝚿</p>
      <p>
        <a href="https://www.youtube.com/@talhamahamud3176" target="_blank"
          >YouTube</a
        >
        |
        <a href="https://www.linkedin.com/in/talhamahamud/" target="_blank"
          >LinkedIn </a
        > | <a href="https://github.com/TalhaMahamud" target="_blank">GitHub</a> |
        <a href="https://talhamahamud.substack.com/" target="_blank"
          >Substack</a
        >
      </p>
    </footer>

    <script>
      const searchBox = document.getElementById("searchBox");
      const blogList = document.getElementById("blogList");
      const noResults = document.getElementById("noResults");
      const allPosts = blogList.querySelectorAll("li");

      searchBox.addEventListener("input", function () {
        const searchTerm = this.value.toLowerCase().trim();
        let visibleCount = 0;

        allPosts.forEach((post) => {
          const title = post.querySelector("a").textContent.toLowerCase();

          if (title.includes(searchTerm)) {
            post.style.display = "flex";
            visibleCount++;
          } else {
            post.style.display = "none";
          }
        });

        // Show "no results" message if no posts match
        if (visibleCount === 0 && searchTerm !== "") {
          noResults.style.display = "block";
        } else {
          noResults.style.display = "none";
        }
      });
    </script>
  </body>
</html>
